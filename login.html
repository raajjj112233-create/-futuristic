<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Futuristic Login Portal</title>
    <style>
        :root {
            --bg-color: #05050a;
            --panel-bg: rgba(10, 10, 25, 0.75);
            --neon-cyan: #00f3ff;
            --neon-magenta: #ff0055;
            --text-color: #e0e0ff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(at 10% 20%, rgba(0, 243, 255, 0.15) 0px, transparent 50%),
                radial-gradient(at 90% 80%, rgba(255, 0, 85, 0.15) 0px, transparent 50%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-color);
            overflow: hidden;
            padding: 20px;
            position: relative;
        }

        body::before {
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            background-image: 
                linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 30px 30px;
            z-index: -1;
        }

        .login-container {
            background: var(--panel-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 40px;
            border-radius: 16px;
            width: 100%;
            max-width: 420px;
            border: 1px solid rgba(0, 243, 255, 0.2);
            box-shadow: 0 0 30px rgba(0, 243, 255, 0.1);
            position: relative;
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 2;
            opacity: 1;
            transform: scale(1) translateY(0);
        }

        /* Enforce absolute removal of the login panel layout */
        .login-container.hide-portal {
            opacity: 0 !important;
            transform: scale(0.8) translateY(100px) !important;
            pointer-events: none !important;
        }

        .login-container::before, .login-container::after {
            content: "";
            position: absolute;
            width: 20px;
            height: 20px;
            border: 2px solid var(--neon-cyan);
        }
        .login-container::before {
            top: -1px;
            left: -1px;
            border-right: none;
            border-bottom: none;
            border-top-left-radius: 16px;
        }
        .login-container::after {
            bottom: -1px;
            right: -1px;
            border-left: none;
            border-top: none;
            border-bottom-right-radius: 16px;
        }

        h2 {
            text-align: center;
            font-size: 2rem;
            margin-bottom: 30px;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #fff;
            text-shadow: 0 0 10px rgba(0, 243, 255, 0.5);
        }

        .input-group {
            position: relative;
            margin-bottom: 30px;
        }

        .username-wrapper {
            position: relative;
            border-left: 4px solid var(--neon-cyan);
            background: rgba(0, 243, 255, 0.03);
            border-radius: 0 8px 8px 0;
            overflow: hidden;
        }

        .password-wrapper {
            position: relative;
            border-left: 4px solid var(--neon-magenta);
            background: rgba(255, 0, 85, 0.03);
            border-radius: 0 8px 8px 0;
            overflow: hidden;
        }

        input {
            width: 100%;
            padding: 15px 15px 15px 12px;
            background: transparent;
            border: none;
            outline: none;
            color: #fff;
            font-size: 1rem;
            letter-spacing: 1px;
        }

        .input-group::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0%;
            height: 2px;
            transition: 0.4s ease;
        }

        .input-group:focus-within::after {
            width: 100%;
        }

        .username-group:focus-within::after {
            background: var(--neon-cyan);
            box-shadow: 0 0 10px var(--neon-cyan);
        }

        .password-group:focus-within::after {
            background: var(--neon-magenta);
            box-shadow: 0 0 10px var(--neon-magenta);
        }

        label {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(224, 224, 255, 0.6);
            pointer-events: none;
            transition: 0.3s ease;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 1px;
        }

        input:focus ~ label,
        input:not(:placeholder-shown) ~ label {
            top: -12px;
            left: 5px;
            font-size: 0.75rem;
            color: #fff;
            font-weight: bold;
        }

        .login-btn {
            width: 100%;
            padding: 15px;
            background: transparent;
            border: 1px solid var(--neon-cyan);
            color: #fff;
            font-size: 1rem;
            letter-spacing: 2px;
            font-weight: bold;
            text-transform: uppercase;
            border-radius: 6px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
            box-shadow: inset 0 0 10px rgba(0, 243, 255, 0.2);
        }

        .login-btn:hover {
            background: var(--neon-cyan);
            color: #000;
            box-shadow: 0 0 20px var(--neon-cyan);
        }

        .utilities {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
            font-size: 0.8rem;
        }

        .utilities a {
            color: rgba(224, 224, 255, 0.6);
            text-decoration: none;
        }

        /* Fixed Canvas Layer Initialization */
        #takeoffCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
            display: none; /* Controlled exclusively via dynamic script triggers */
        }

        @media (max-height: 500px) and (orientation: landscape) {
            body { align-items: flex-start; padding: 10px; height: auto; }
            .login-container { max-width: 600px; padding: 20px 30px; display: grid; grid-template-columns: 1fr; gap: 10px; }
            h2 { margin-bottom: 15px; font-size: 1.5rem; }
            .input-group { margin-bottom: 20px; }
            .utilities { margin-top: 10px; }
        }
    </style>
</head>
<body>

    <canvas id="takeoffCanvas"></canvas>

    <div class="login-container" id="loginPortal">
        <h2>System Login</h2>
        <!-- Form execution actions overridden for clean localized rendering -->
        <form onsubmit="loginUser(event); return false;">
            
            <div class="input-group username-group">
                <div class="username-wrapper">
                    <input type="text" id="username" placeholder=" ">
                    <label for="username">Identity Core / User</label>
                </div>
            </div>

            <div class="input-group password-group">
                <div class="password-wrapper">
                    <input type="password" id="password" placeholder=" ">
                    <label for="password">Access Phrase / Pass</label>
                </div>
            </div>

            <button type="submit" class="login-btn">Initialize</button>
            
            <div class="utilities">
                <a href="#">Forgot Pass?</a>
                <a href="#" onclick="registerUser()">
                    Create Identity
                </a>
            </div>
        </form>
    </div>
    
</body>

    

    <script>
        const canvas = document.getElementById('takeoffCanvas');
        const ctx = canvas.getContext('2d');
        let animationFrameId;

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        let stars = [];
        let jetParticles = [];
        let airplane = {
            x: 0,
            y: 0,
            scale: 0.1,
            speedY: 4,
            targetY: 0,
            state: 'runway'
        };

        function initStars() {
            stars = [];
            for (let i = 0; i < 120; i++) {
                stars.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    radius: Math.random() * 2,
                    speed: Math.random() * 0.8 + 0.2
                });
            }
        }

        function drawAirplane(ctx, x, y, scale) {
            ctx.save();
            ctx.translate(x, y);
            ctx.scale(scale, scale);

            // Engine core flame glow
            ctx.shadowBlur = 25;
            ctx.shadowColor = "#ff0055";
            ctx.fillStyle = '#ff0055';
            ctx.fillRect(-12, 70, 8, 12);
            ctx.fillRect(4, 70, 8, 12);

            // Vector Hull Framework
            ctx.shadowBlur = 15;
            ctx.shadowColor = "#00f3ff";
            ctx.strokeStyle = '#00f3ff';
            ctx.lineWidth = 3;
            ctx.fillStyle = '#050510';
            
            ctx.beginPath();
            ctx.moveTo(0, -90); 
            ctx.lineTo(12, -20);
            ctx.lineTo(85, 35);
            ctx.lineTo(15, 40);
            ctx.lineTo(12, 70);
            ctx.lineTo(0, 60);
            ctx.lineTo(-12, 70);
            ctx.lineTo(-15, 40);
            ctx.lineTo(-85, 35);
            ctx.lineTo(-12, -20);
            ctx.closePath();
            ctx.fill();
            ctx.stroke();
            ctx.restore();
          
        }
        function animateScene() {
          ctx.fillStyle = 'rgba(5, 5, 10, 0.3)';
          ctx.fillRect(0, 0, canvas.width, canvas.height);
          // Starfield Matrix update
          ctx.fillStyle = '#ffffff';
          stars.forEach(star => {
            ctx.beginPath();
            ctx.arc(star.x, star.y, star.radius, 0, Math.PI * 2);
            ctx.fill();star.y += star.speed * (airplane.state === 'supersonic' ? 30 : 1.5);
            if (star.y > canvas.height) star.y = 0;});
            // Combustion Particle Generation
            if (airplane.y < canvas.height + 100) {
              for (let i = 0; i < 3; i++) {
                jetParticles.push({
                  x: airplane.x + (Math.random() * 16 - 8),
                  y: airplane.y + (60 * airplane.scale),
                  vx: Math.random() * 2 - 1,
                  vy: Math.random() * 4 + 5,
                  alpha: 1,
                  color: Math.random() > 0.4 ? '#ff0055' :
                  '#00f3ff'
                  
                });
                
              }
              
            }
            // Engine Exhaust Vector Trailing
            jetParticles.forEach((p, idx) => {
              p.x += p.vx;
              p.y += p.vy * (airplane.state === 'supersonic' ? 2 : 1);
              p.alpha -= 0.025;
              if (p.alpha <= 0) {
                jetParticles.splice(idx, 1);
                
              } else {
                ctx.save();
                ctx.globalAlpha = p.alpha;
                ctx.fillStyle = p.color;
                ctx.shadowBlur = 8;
                ctx.shadowColor = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, Math.random() * 3 * airplane.scale + 1, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
                
              }
              
            });
            // Flight State Machine Logic Controls
            if (airplane.state === 'runway') {airplane.y -= airplane.speedY;
            airplane.scale += 0.0025;
            if (airplane.y <= canvas.height * 0.7) {
              airplane.state = 'liftoff';
              
            }
              
            } else if (airplane.state === 'liftoff') {
              airplane.y -= (airplane.y - airplane.targetY) * 0.04 + 1.5;
              airplane.scale += 0.003;
              if (airplane.y <= airplane.targetY + 10) {airplane.state = 'supersonic';
                
              }
              
            } else if (airplane.state === 'supersonic') {
              airplane.y -= airplane.speedY;
              airplane.speedY *= 1.14;
              airplane.scale -= 0.006;
              
            }
            if (airplane.y > -200) {
              drawAirplane(ctx, airplane.x, airplane.y,airplane.scale);
              animationFrameId = requestAnimationFrame(animateScene);
              
            } else {
              cancelAnimationFrame(animationFrameId);
              alert("Core Interface Authorized. Welcome Pilot.");
              location.reload();
              
            }
          
        }
        function handleLogin(event) {
          // Prevent page refreshing actions entirely
          if(event) {
            event.preventDefault();
            event.stopPropagation();
            
          }
          // Force hide the box layout using direct DOM string alterations
          const portal = 
          document.getElementById('loginPortal');
          portal.classList.add('hide-portal');
          portal.style.display = 'none';
          // Initialize rendering canvas dimensions
          canvas.style.display = 'block';
          resizeCanvas();
          initStars();
          // Set coordinates relative to active viewport sizes
          airplane.x = canvas.width / 2;
          airplane.y = canvas.height + 100;
          airplane.scale = 0.15;
          airplane.speedY = 4;
          airplane.targetY = canvas.height * 0.4;
          airplane.state = 'runway';
          jetParticles = [];
          // Execute engine cycles
          animateScene();
          
        }

        async function loginUser(event){
    
            event.preventDefault();

            const username =    
                document.getElementById("username").value;

            const password =
                document.getElementById("password").value;

            try{

                const response = await fetch(
                    "https://consists-emerald-circuit-sperm.trycloudflare.com/login",
                    {
                        method:"POST",
                        headers:{
                            "Content-Type":"application/json"
                        },
                        body:JSON.stringify({
                            username,
                            password
                        })
                    }
                );
        
                const result =        
                    await response.json();
        
                if(result.success){
    
                    handleLogin();
    
                }else{
    
                    alert(result.message);
    
                }
    
            }catch(error){
    
                alert("Server Offline");
    
            }

        }

    </script>
