<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Futuristic Login Portal</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <canvas id="takeoffCanvas"></canvas>

    <div class="login-container" id="loginPortal">
        <h2>System Login</h2>

        <form onsubmit="loginUser(event); return false;">

            <div class="input-group username-group">
                <div class="username-wrapper">
                    <input
                        type="text"
                        id="username"
                        placeholder=" "
                    >
                    <label for="username">
                        Identity Core / User
                    </label>
                </div>
            </div>

            <div class="input-group password-group">
                <div class="password-wrapper">
                    <input
                        type="password"
                        id="password"
                        placeholder=" "
                    >
                    <label for="password">
                        Access Phrase / Pass
                    </label>
                </div>
            </div>

            <button
                type="submit"
                class="login-btn"
            >
                Initialize
            </button>

            <div class="utilities">

                <a href="#">
                    Forgot Pass?
                </a>

                <a
                    href="#"
                    onclick="registerUser(); return false;"
                >
                    Create Identity
                </a>

            </div>

        </form>
    </div>

    <script src="script.js"></script>

</body>
</html>
